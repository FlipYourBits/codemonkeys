[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langclaude"
version = "0.1.0"
description = "LangGraph nodes powered by the Claude Agent SDK, with bundled skills and per-node permissions."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "FlipYourBits" }]
keywords = ["langgraph", "claude", "agent-sdk", "anthropic", "ai-agents"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "claude-agent-sdk>=0.1.0,<0.2",
    "langgraph>=0.2.0,<2",
]

[project.optional-dependencies]
python = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pip-audit>=2.7",
    "ruff>=0.5,<1",
]
dev = [
    "langclaude[python]",
    "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://github.com/FlipYourBits/langclaude"

[tool.hatch.build.targets.wheel]
packages = ["src/langclaude"]

[tool.hatch.build.targets.wheel.force-include]
"src/langclaude/skills" = "langclaude/skills"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
